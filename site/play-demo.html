<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BettaDayz Web Demo</title><link rel="stylesheet" href="./styles.css"></head><body><nav><strong>BettaDayz RP</strong><a href="./index.html">Home</a><a href="./catalog.html">Catalog</a><a href="./setup.html">Setup</a></nav><main class="page"><h1>Static Web Demo</h1><p class="lead">This GitHub Pages version is a static first demo. Move with WASD/arrow keys, collect BettaBukz, and drive to the BettaKarts Arena marker. The full multiplayer version runs locally with Node.js.</p><section class="panel"><p><b>Cash:</b> $<span id="cash">3250</span> · <b class="bbz">BettaBukz:</b> <span id="bbz">250</span> BBZ · <b>Zone:</b> <span id="zone">Granby Row</span></p><canvas id="game" width="1100" height="540"></canvas></section></main><script>const c=document.getElementById('game'),ctx=c.getContext('2d');let p={x:180,y:180,cash:3250,bbz:250};const keys={};const zones=[['Granby Row',220,190,'#22c55e'],['NEON Arts',480,260,'#a855f7'],['Waterside',720,210,'#facc15'],['BettaKarts Arena',900,350,'#d946ef'],['Ocean View',620,430,'#38bdf8']];const coins=Array.from({length:28},(_,i)=>({x:80+Math.random()*940,y:80+Math.random()*380,on:true}));addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true});addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});function loop(){requestAnimationFrame(loop);let dx=(keys.d||keys.arrowright?1:0)-(keys.a||keys.arrowleft?1:0),dy=(keys.s||keys.arrowdown?1:0)-(keys.w||keys.arrowup?1:0),l=Math.hypot(dx,dy)||1;p.x=Math.max(20,Math.min(c.width-20,p.x+dx/l*4));p.y=Math.max(20,Math.min(c.height-20,p.y+dy/l*4));ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#020617';ctx.fillRect(0,0,c.width,c.height);for(const z of zones){ctx.strokeStyle=z[3];ctx.beginPath();ctx.arc(z[1],z[2],70,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#cbd5e1';ctx.fillText(z[0],z[1]-35,z[2])}for(const coin of coins)if(coin.on){ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(coin.x,coin.y,7,0,Math.PI*2);ctx.fill();if(Math.hypot(p.x-coin.x,p.y-coin.y)<18){coin.on=false;p.bbz+=10;bbz.textContent=p.bbz}}let nearest=zones.map(z=>[z[0],Math.hypot(p.x-z[1],p.y-z[2])]).sort((a,b)=>a[1]-b[1])[0];zone.textContent=nearest[0];ctx.fillStyle='#84cc16';ctx.beginPath();ctx.arc(p.x,p.y,14,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.fillText('Player',p.x-16,p.y-20)}loop()</script></body></html>
