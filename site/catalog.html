<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BettaDayz Catalog Preview</title><link rel="stylesheet" href="./styles.css"></head><body><nav><strong>BettaDayz RP</strong><a href="./index.html">Home</a><a href="./play-demo.html">Play Demo</a><a href="./setup.html">Setup</a></nav><main class="page"><h1>Catalog Preview</h1><p class="lead">Browse the first public website preview of BettaBukz items, vehicles, housing, pets, tiers, exclusives, and races.</p><div class="toolbar"><input id="q" placeholder="Search catalog..." oninput="render()"><button onclick="filter='all';render()">All</button><button onclick="filter='vehicles';render()">Vehicles</button><button onclick="filter='homes';render()">Housing</button><button onclick="filter='pets';render()">Pets</button><button onclick="filter='memberTiers';render()">Tiers</button><button onclick="filter='exclusivePurchases';render()">Exclusive</button><button onclick="filter='races';render()">Races</button></div><section id="grid" class="grid"></section></main><script>let data={},filter='all';async function load(){data=await(await fetch('./data/catalog.json')).json();render()}function flatten(){let arr=[];for(const key of ['vehicles','homes','pets','memberTiers','exclusivePurchases','races'])if(filter==='all'||filter===key)arr.push(...(data[key]||[]).map(x=>({...x,_type:key})));if(filter==='all'||filter==='shops')(data.shops||[]).forEach(s=>(s.items||[]).forEach(i=>arr.push({...i,_type:s.name,district:s.district})));return arr}function render(){const text=(q.value||'').toLowerCase();grid.innerHTML=flatten().filter(x=>(x.name+x.id+(x.district||'')).toLowerCase().includes(text)).slice(0,120).map(x=>`<article class="item"><small>${x._type} ${x.district?'• '+x.district:''}</small><h2>${x.name}</h2><p>${x.category||x.type||x.class||x.requiredClass||''}</p><b>$${Number(x.price||x.entryFee||0).toLocaleString()} ${x.bettabukzPrice||x.bettabukzCost?` • ${Number(x.bettabukzPrice||x.bettabukzCost).toLocaleString()} BBZ`:''}</b></article>`).join('')}load()</script></body></html>
