<!doctype html><html><head><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="/style.css"></head><body class="bg-slate-950 text-white p-6"><h1 class="text-3xl font-black">Moderation</h1><button class="btn bg-cyan-700" onclick="load()">Load</button><pre id="out" class="bg-slate-900 rounded-xl p-4 mt-4"></pre><script>async function load(){const t=localStorage.getItem('bd_token');out.textContent=JSON.stringify({players:await(await fetch('/api/admin/players',{headers:{Authorization:'Bearer '+t}})).json(),audit:await(await fetch('/api/admin/audit',{headers:{Authorization:'Bearer '+t}})).json()},null,2)}</script></body></html>
