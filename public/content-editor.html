<!doctype html><html><head><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="/style.css"></head><body class="bg-slate-950 text-white p-6"><h1 class="text-3xl font-black">Content Editor</h1><select id="file" class="input max-w-xl"><option>catalog</option><option>bettabukz</option><option>economy</option><option>dialogue</option></select><textarea id="editor" class="input h-[60vh] font-mono"></textarea><button class="btn bg-cyan-700" onclick="loadC()">Load</button><button class="btn bg-green-700" onclick="dl()">Download</button><script>let c={};async function loadC(){c=await(await fetch('/api/content')).json();editor.value=JSON.stringify(c[file.value],null,2)}function dl(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([editor.value],{type:'application/json'}));a.download=file.value+'.json';a.click()}loadC()</script></body></html>
