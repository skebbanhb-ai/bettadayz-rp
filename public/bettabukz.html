<!doctype html><html><head><meta charset="utf-8"><title>BettaBukz Store</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="/style.css"></head><body class="bg-slate-950 text-white p-6"><h1 class="text-4xl font-black text-yellow-300">BettaBukz Store</h1><p class="text-slate-400">BettaBukz unlocks exclusive member tiers, VIP goods, racing perks, pets, cosmetics, homes, and arena flex items.</p><img src="/assets/branding/bettakarts.jpeg" class="max-w-md rounded-2xl my-4 border border-purple-700"><h2 class="text-2xl font-bold mt-5">Member Tiers</h2><div id="tiers" class="grid md:grid-cols-3 gap-4"></div><h2 class="text-2xl font-bold mt-8">Exclusive Purchases</h2><div id="exclusive" class="grid md:grid-cols-3 gap-4"></div><script src="/shared-ws.js"></script><script>let data={};async function load(){data=await(await fetch('/api/catalog')).json();tiers.innerHTML=(data.memberTiers||[]).map(t=>`<div class='rounded-2xl bg-slate-900 p-4 border border-yellow-700'><h3 class='text-xl font-bold'>${t.name}</h3><p>${t.dailyBettaBukz} daily BBZ • ${t.cashBonusPct}% cash bonus</p><p class='text-yellow-300 font-bold'>${t.bettabukzCost} BBZ</p><button class='btn bg-yellow-700' onclick="BD.send({type:'member:buy',tierId:'${t.id}'})">Unlock Tier</button></div>`).join('');exclusive.innerHTML=(data.exclusivePurchases||[]).map(x=>`<div class='rounded-2xl bg-slate-900 p-4 border border-purple-700'><h3 class='text-xl font-bold'>${x.name}</h3><p>Requires: ${x.tierRequired}</p><p class='text-yellow-300 font-bold'>${x.bettabukzPrice} BBZ</p><button class='btn bg-purple-700' onclick="BD.send({type:'catalog:buy',itemId:'${x.id}'})">Buy Exclusive</button></div>`).join('')}BD.on('system',alert);load()</script></body></html>
