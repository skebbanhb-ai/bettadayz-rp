<!doctype html><html><head><meta charset="utf-8"><title>BettaDayz Catalog</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="/style.css"></head><body class="bg-slate-950 text-white p-6"><h1 class="text-3xl font-black">VIP / Vehicles / Housing / Pets</h1><p class="text-slate-400">Cash and BettaBukz purchases.</p><input id="search" class="input max-w-xl" placeholder="Search..." oninput="render()"><div class="my-3 flex gap-2 flex-wrap"><button class="btn bg-cyan-700" onclick="filter='all';render()">All</button><button class="btn bg-purple-700" onclick="filter='vehicles';render()">Vehicles</button><button class="btn bg-green-700" onclick="filter='homes';render()">Housing</button><button class="btn bg-orange-700" onclick="filter='pets';render()">Pets</button><button class="btn bg-yellow-700" onclick="filter='memberTiers';render()">Tiers</button><button class="btn bg-amber-700" onclick="filter='exclusivePurchases';render()">Exclusive</button><button class="btn bg-slate-700" onclick="filter='shops';render()">Shops</button><button class="btn bg-fuchsia-700" onclick="filter='races';render()">Races</button></div><div id="grid" class="grid md:grid-cols-3 gap-4"></div><script src="/shared-ws.js"></script><script>let data={},filter='all';async function load(){data=await(await fetch('/api/catalog')).json();render()}function flatten(){let arr=[];for(const key of ['vehicles','homes','pets','memberTiers','exclusivePurchases','races'])if(filter==='all'||filter===key)arr.push(...(data[key]||[]).map(x=>({...x,_type:key})));if(filter==='all'||filter==='shops')(data.shops||[]).forEach(s=>(s.items||[]).forEach(i=>arr.push({...i,_type:s.name,district:s.district})));return arr}function buy(x){if(x._type==='races')BD.send({type:'race:start',raceId:x.id});else if(x._type==='memberTiers')BD.send({type:'member:buy',tierId:x.id});else BD.send({type:'catalog:buy',itemId:x.id})}function render(){const q=(search.value||'').toLowerCase(),list=flatten().filter(x=>(x.name+x.id+(x.district||'')).toLowerCase().includes(q));grid.innerHTML=list.map((x,i)=>`<div class='rounded-2xl bg-slate-900 p-4 border border-slate-700'><div class='text-xs text-cyan-300'>${x._type} • ${x.district||''}</div><h2 class='text-xl font-bold'>${x.name}</h2><p class='text-slate-400'>${x.category||x.type||x.class||x.requiredClass||''}</p><p class='text-green-300 font-bold'>$${Number(x.price||x.entryFee||0).toLocaleString()}</p><p class='text-yellow-300 font-bold'>${Number(x.bettabukzPrice||x.bettabukzCost||0).toLocaleString()} BBZ</p><button class='btn bg-emerald-700 mt-2' data-i='${i}'>${x._type==='races'?'Queue Race':x._type==='memberTiers'?'Unlock Tier':'Buy'}</button></div>`).join('');document.querySelectorAll('#grid button').forEach(b=>b.onclick=()=>buy(list[+b.dataset.i]))}BD.on('system',alert);load()</script></body></html>
